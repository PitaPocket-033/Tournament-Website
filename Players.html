<!DOCTYPE html>
<html>
<head>
<title>Players</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(to right,#141e30,#243b55);
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    background:rgba(0,0,0,0.6);
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    padding:8px 15px;
    border-radius:20px;
    transition:0.3s;
}

nav a:hover{
    background:white;
    color:#243b55;
}

h2{
    text-align:center;
    margin-top:30px;
}

/* NEW: Filter Controls Styling */
.filter-controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 20px auto;
    max-width: 800px;
}

.filter-controls input, .filter-controls select {
    padding: 10px;
    border-radius: 5px;
    border: none;
    outline: none;
    font-size: 14px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3, 220px);
    justify-content:center; 
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    color:black;
    padding:12px;
    border-radius:12px;
    text-align:center;
    transition:0.4s;
    width:220px; 
    /* NEW: Position relative for the absolute diamond badge */
    position: relative; 
    transform-style: preserve-3d;
}

.card img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:50%;
    margin-bottom:10px;
}

.card h3, .card p {
    margin: 5px 0;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 10px 20px rgb(255, 255, 255);
}

/* NEW: Flipping Animation */
.flip-animation {
    animation: flipIn 0.5s ease-out forwards;
}

@keyframes flipIn {
    0% { transform: perspective(400px) rotateY(90deg); opacity: 0; }
    100% { transform: perspective(400px) rotateY(0deg); opacity: 1; }
}

/* NEW: Diamond Badge */
.diamond-badge {
    position: absolute;
    top: -10px;
    right: -10px;
    background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    color: #000;
    width: 45px;
    height: 45px;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 11px;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    z-index: 10;
}
.error{
    grid-column:1 / -1;
    text-align:center;
    font-size:18px;
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:12px;
}

</style>

<link rel="stylesheet" href="CSS/awesome-theme.css">
</head>
<body>

<header>
<div>🏆 Tournament 2026</div>
<nav>
<a href="index.html">Home</a>
<a href="Schedule.html">Schedule</a>
<a href="Players.html">Players</a>
<a href="Contact.html">Contact</a>
<a href="SignUp.html">Sign Up</a>
<a href="Login.html">Login</a>
</nav>
</header>
<h2>Top Players</h2>

<div class="filter-controls">
    <input type="text" id="searchInput" placeholder="Search player by name...">
    
    <select id="gameFilter">
        <option value="">All Games</option>
        <option value="PUBG">PUBG</option>
        <option value="Valorant">Valorant</option>
        <option value="Rocket League">Rocket League</option>
        <option value="Fortnite">Fortnite</option>
        <option value="Dota 2">Dota 2</option>
        <option value="League of Legends">League of Legends</option>
    </select>

    <select id="rankFilter">
        <option value="">All Ranks</option>
        <option value="Top">Top Ranked (1-3)</option>
        <option value="Mid">Mid Ranked (4-6)</option>
        <option value="Low">Low Ranked (7+)</option>
    </select>
</div>

<div class="grid" id="playersContainer">
</div>

<script src="site.js"></script>
<script src="Players.js"></script>
</body>
</html>
