<!DOCTYPE html>
<html>
<head>
<title>Schedule</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    background:rgba(0,0,0,0.6);
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    padding:8px 15px;
    border-radius:20px;
    transition:0.3s;
}

nav a:hover{
    background:white;
    color:#2c5364;
}

h2{
    text-align:center;
    margin-top:30px;
}

table{
    width:85%;
    margin:40px auto;
    border-collapse:collapse;
    background:white;
    color:black;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    padding:15px;
    text-align:center;
}

th{
    background:#2c5364;
    color:white;
}

.api-note{
    text-align:center;
    margin-top:8px;
    color:#e8f6ff;
}

.teams-section{
    width:85%;
    margin:20px auto 50px;
}

.teams-section h2{
    margin-top:10px;
}

.team-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:18px;
    margin-top:25px;
}

.team-card{
    background:white;
    color:#111;
    padding:18px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
    transition:0.3s;
}

.team-card:hover{
    transform:translateY(-8px);
}

.team-card h3{
    margin:0 0 10px;
    color:#2c5364;
}

tr:nth-child(even){
    background:#f2f2f2;
}

tr:hover{
    background:#ddd;
}

.final{
    background:gold !important;
    font-weight:bold;
    font-size:18px;
}
</style>

<link rel="stylesheet" href="CSS/awesome-theme.css">
</head>
<body>

<header>
<div>🏆 Tournament 2026</div>
<nav>
<a href="index.html">Home</a>
<a href="Schedule.html">Schedule</a>
<a href="Players.html">Players</a>
<a href="Contact.html">Contact</a>
<a href="SignUp.html">Sign Up</a>
<a href="Login.html">Login</a>
</nav>
</header>

<h2>Tournament Schedule</h2>
<p class="api-note">Tournament data is loaded from the backend API: <strong>GET /tournaments</strong></p>

<table>
<thead>
<tr>
<th>Date</th>
<th>Tournament</th>
<th>Game</th>
<th>Time</th>
</tr>
</thead>
<tbody id="tournamentBody">
<tr>
<td colspan="4">Loading tournaments...</td>
</tr>
</tbody>
</table>

<section class="teams-section">
<h2>Player Teams</h2>
<p class="api-note">Team data is loaded from the backend API: <strong>GET /teams</strong></p>
<div class="team-grid" id="teamsContainer">
<p>Loading teams...</p>
</div>
</section>

<script src="config.js"></script>
<script src="site.js"></script>
<script src="Schedule.js"></script>
</body>
</html>
