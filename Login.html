<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(to right,#141e30,#243b55);
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    background:rgba(0,0,0,0.6);
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    padding:8px 15px;
    border-radius:20px;
    transition:0.3s;
}

nav a:hover{
    background:white;
    color:#243b55;
}

h2{
    text-align:center;
    margin-top:30px;
}

form{
    width:35%;
    margin:40px auto;
    background:white;
    color:black;
    padding:30px;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    position:relative;
}

input{
    padding:10px;
    margin-bottom:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

small{
    color:red;
    font-size:13px;
    margin-bottom:10px;
}

.password-container{
    position:relative;
}

.toggle{
    position:absolute;
    right:10px;
    top:8px;
    cursor:pointer;
    font-size:18px;
}

button{
    padding:12px;
    border:none;
    border-radius:25px;
    margin-top:10px;
    cursor:pointer;
    background:#243b55;
    color:white;
    transition:0.3s;
}

button:hover{
    background:green;
    transform:scale(1.05);
}

#loginMessage{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}
</style>
<link rel="stylesheet" href="CSS/awesome-theme.css">
</head>

<body>

<header>
<div>🏆 Tournament 2026</div>
<nav>
<a href="index.html">Home</a>
<a href="SignUp.html">Sign Up</a>
<a href="login.html">Login</a>
</nav>
</header>

<h2>Login to Your Account</h2>

<form id="loginForm">

<input type="text" id="email" placeholder="Email Address">
<small id="emailError"></small>

<div class="password-container">
<input type="password" id="password" placeholder="Password">
<span class="toggle" id="togglePassword">🙈</span>
</div>
<small id="passwordError"></small>

<button type="submit">Login</button>

<div id="loginMessage"></div>

</form>

<script>

const form = document.getElementById("loginForm");
const email = document.getElementById("email");
const password = document.getElementById("password");
const toggle = document.getElementById("togglePassword");
const loginMessage = document.getElementById("loginMessage");

// Show/Hide Password Feature
toggle.addEventListener("click", function(){

    if(password.type === "password"){
        password.type = "text";
        toggle.textContent = "👁️";   // Open eye
    } else {
        password.type = "password";
        toggle.textContent = "🙈";   // Closed eye
    }

});

// Form Validation
form.addEventListener("submit", async function(e){

    e.preventDefault();  // Prevent default submission

    let valid = true;

    // Email validation
    if(email.value.trim() === ""){
        document.getElementById("emailError").textContent = "Email is required";
        valid = false;
    } else {
        document.getElementById("emailError").textContent = "";
    }

    // Password validation
    if(password.value.trim() === ""){
        document.getElementById("passwordError").textContent = "Password is required";
        valid = false;
    } else {
        document.getElementById("passwordError").textContent = "";
    }

    if(!valid) return;

    try{
        const data = await TournamentApp.apiFetch("/login", {
            method:"POST",
            body: JSON.stringify({
                email: email.value.trim(),
                password: password.value
            })
        });
        TournamentApp.saveSession({ token: data.token, user: data.user });
        TournamentApp.applyTheme(data.user.preferredTheme);

        loginMessage.textContent = "Login successful. Account verified from the database.";
        loginMessage.style.color = "green";
        form.reset();
        toggle.textContent = "🙈";
        password.type = "password";
        setTimeout(() => {
            location.href = data.user.role === "ADMIN" ? "Admin.html" : "Profile.html";
        }, 900);
    }
    catch(error){
        loginMessage.textContent = error.message;
        loginMessage.style.color = "red";
    }

});

</script>

<script src="config.js"></script>
<script src="site.js"></script>
</body>
</html>
