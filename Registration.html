<!DOCTYPE html>
<html>
<head>
<title>Tournament Registration</title>

<style>
    /* Borrowed from your index.html */
    body{
        margin:0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to right,#1e3c72,#2a5298);
        color:white;
    }

    header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:15px 40px;
        background:rgba(0,0,0,0.6);
    }

    .logo{
        font-size:22px;
        font-weight:bold;
    }

    nav a{
        color:white;
        text-decoration:none;
        margin:0 15px;
        padding:8px 15px;
        border-radius:20px;
        transition:0.3s;
    }

    nav a:hover{
        background:white;
        color:#1e3c72;
    }

    /* Layout for Registration and List */
    .container {
        display: flex;
        justify-content: space-around;
        padding: 40px;
        align-items: flex-start;
    }

    .box {
        background: white;
        color: black;
        padding: 30px;
        border-radius: 15px;
        width: 40%;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-top: 0;
    }

    /* Form Styles */
    input {
        width: 95%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        display: block;
    }

    .register-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        background: #1e3c72;
        color: white;
        font-size: 16px;
        transition: 0.3s;
    }

    .register-btn:hover {
        background: gold;
        color: #1e3c72;
        transform: scale(1.02);
    }

    /* List Styles */
    .participant-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f4f4f4;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
        border-left: 5px solid #1e3c72;
    }

    .remove-btn {
        background: #ff4d4d;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .remove-btn:hover {
        background: #cc0000;
    }

    .error-msg {
        color: red;
        text-align: center;
        margin-bottom: 10px;
        font-weight: bold;
    }
</style>

<link rel="stylesheet" href="CSS/awesome-theme.css">
</head>
<body>

<header>
    <div class="logo">🏆 Tournament 2026</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="Schedule.html">Schedule</a>
        <a href="Players.html">Players</a>
        <a href="Registration.html">Register</a>
        <a href="SignUp.html">Sign Up</a>
        <a href="Login.html">Login</a>
    </nav>
</header>

<div class="container">
    <div class="box">
        <h2>Tournament Registration</h2>
        <div id="errorMsg" class="error-msg"></div>
        <p style="text-align:center; color:#333; margin-top:-6px;">Registration fee: <strong>$25.00</strong>. Use the payment page for full checkout.</p>
        
        <input type="text" id="playerName" placeholder="Player Name">
        <input type="text" id="gameId" placeholder="Game ID">
        <input type="text" id="teamName" placeholder="Team Name">

        <button class="register-btn" onclick="registerPlayer()">[Register]</button>
        <p style="text-align:center; margin-top:14px;"><a href="Payment.html">Open Payment Gateway</a></p>
    </div>

    <div class="box">
        <h2>Participants List</h2>
        <p style="text-align: center; font-weight: bold;">
            Total Registered: <span id="playerCount">0</span> / 10
        </p>
        <div id="participantsList"></div>
    </div>
</div>

<script>
    let participants = [];

    document.addEventListener("DOMContentLoaded", loadParticipants);

    async function loadParticipants() {
        const errorMsg = document.getElementById("errorMsg");

        try {
            participants = await TournamentApp.apiFetch("/registrations");
            errorMsg.textContent = "";
            displayParticipants();
        } catch (error) {
            console.error(error);
            errorMsg.textContent = "Could not load registrations. Please start the backend server.";
        }
    }

    async function registerPlayer() {
        const name = document.getElementById("playerName").value.trim();
        const gameId = document.getElementById("gameId").value.trim();
        const team = document.getElementById("teamName").value.trim();
        const errorMsg = document.getElementById("errorMsg");

        if (name === "" || gameId === "" || team === "") {
            errorMsg.textContent = "Please fill out all fields.";
            return;
        }

        try {
            await TournamentApp.apiFetch("/registrations", {
                method: "POST",
                body: JSON.stringify({
                    playerName: name,
                    gameId: gameId,
                    teamName: team
                })
            });

            document.getElementById("playerName").value = "";
            document.getElementById("gameId").value = "";
            document.getElementById("teamName").value = "";
            errorMsg.textContent = "";

            await loadParticipants();
        } catch (error) {
            errorMsg.textContent = error.message;
        }
    }

    function displayParticipants() {
        const container = document.getElementById("participantsList");
        const countDisplay = document.getElementById("playerCount");

        container.innerHTML = "";
        countDisplay.textContent = participants.length;

        if (participants.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>No registrations yet.</p>";
            return;
        }

        for (let i = 0; i < participants.length; i++) {
            const div = document.createElement("div");
            div.className = "participant-item";
            div.innerHTML = `
                <div>
                    <strong>${i + 1}. ${participants[i].playerName}</strong><br>
                    <small>ID: ${participants[i].gameId} | Team: ${participants[i].teamName}</small>
                </div>
            `;

            const removeBtn = document.createElement("button");
            removeBtn.className = "remove-btn";
            removeBtn.textContent = "Remove";
            removeBtn.onclick = function() {
                removePlayer(participants[i].id);
            };

            div.appendChild(removeBtn);
            container.appendChild(div);
        }
    }

    async function removePlayer(id) {
        const errorMsg = document.getElementById("errorMsg");

        try {
            await TournamentApp.apiFetch(`/registrations/${id}`, {
                method: "DELETE"
            });

            errorMsg.textContent = "";
            await loadParticipants();
        } catch (error) {
            errorMsg.textContent = error.message;
        }
    }
</script>

<script src="site.js"></script>
</body>
</html>
